<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="560" viewBox="0 0 1400 560">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#34495e" />
    </marker>
    <style>
      .box{fill:#f8fbff;stroke:#2c3e50;stroke-width:2;rx:18;}
      .graph{fill:#fff7f0;stroke:#a65e2e;stroke-width:2;rx:18;}
      .wire{fill:#f3fff8;stroke:#218c5a;stroke-width:2;rx:18;}
      .small{font: 20px Arial, sans-serif; fill:#2c3e50;}
      .label{font: 24px Arial, sans-serif; font-weight:700; fill:#2c3e50;}
      .caption{font: 18px Arial, sans-serif; fill:#59636e;}
      .arrow{stroke:#34495e;stroke-width:3;fill:none;marker-end:url(#arrow);}
      .dash{stroke:#6b7c93;stroke-width:2.5;fill:none;stroke-dasharray:7 6;marker-end:url(#arrow);}
    </style>
  </defs>
  <text x="700" y="38" text-anchor="middle" class="label">WIRE Architecture: Spectral Coordinates as Rotary Attention Bias</text>

  <rect x="55" y="95" width="240" height="100" class="box" />
  <text x="175" y="130" text-anchor="middle" class="label">Input Tensor</text>
  <text x="175" y="160" text-anchor="middle" class="small">300 stocks × 20 days</text>
  <text x="175" y="186" text-anchor="middle" class="small">× 25 model features</text>

  <line x1="295" y1="145" x2="380" y2="145" class="arrow" />
  <rect x="380" y="95" width="230" height="100" class="box" />
  <text x="495" y="130" text-anchor="middle" class="label">2-layer LSTM</text>
  <text x="495" y="160" text-anchor="middle" class="small">shared across stocks</text>
  <text x="495" y="186" text-anchor="middle" class="small">64-d embeddings</text>

  <line x1="610" y1="145" x2="710" y2="145" class="arrow" />
  <rect x="710" y="70" width="320" height="150" class="wire" />
  <text x="870" y="108" text-anchor="middle" class="label">WIRE Attention ×2</text>
  <text x="870" y="142" text-anchor="middle" class="small">Q,K rotated by graph position</text>
  <text x="870" y="172" text-anchor="middle" class="small">softmax(QᵣKᵣᵀ/√d + bias·Corr)</text>
  <text x="870" y="202" text-anchor="middle" class="small">4 heads, FFN, residual</text>

  <line x1="1030" y1="145" x2="1135" y2="145" class="arrow" />
  <rect x="1135" y="95" width="210" height="100" class="box" />
  <text x="1240" y="130" text-anchor="middle" class="label">Prediction</text>
  <text x="1240" y="160" text-anchor="middle" class="small">Linear 64→32→1</text>
  <text x="1240" y="186" text-anchor="middle" class="small">rank scores</text>

  <rect x="55" y="330" width="310" height="130" class="graph" />
  <text x="210" y="365" text-anchor="middle" class="label">Fundamental Graphs</text>
  <text x="210" y="397" text-anchor="middle" class="small">Sector: 5D</text>
  <text x="210" y="427" text-anchor="middle" class="small">TNIC competitors: 6D</text>
  <text x="210" y="457" text-anchor="middle" class="small">13F ownership: 5D</text>

  <line x1="365" y1="395" x2="505" y2="395" class="arrow" />
  <rect x="505" y="330" width="270" height="130" class="graph" />
  <text x="640" y="365" text-anchor="middle" class="label">Laplacian Spectrum</text>
  <text x="640" y="397" text-anchor="middle" class="small">normalized Laplacian</text>
  <text x="640" y="427" text-anchor="middle" class="small">smallest non-zero eigenvectors</text>
  <text x="640" y="457" text-anchor="middle" class="small">16D coordinate per stock</text>

  <line x1="775" y1="395" x2="870" y2="220" class="dash" />
  <text x="830" y="330" class="caption">zᵢ → θᵢ = zᵢWθ</text>

  <rect x="900" y="330" width="300" height="130" class="box" />
  <text x="1050" y="365" text-anchor="middle" class="label">Fallback Mix</text>
  <text x="1050" y="400" text-anchor="middle" class="small">ŷ = α·ŷLSTM + (1−α)·ŷWIRE</text>
  <text x="1050" y="430" text-anchor="middle" class="small">learned α protects against bad graphs</text>
  <text x="1050" y="458" text-anchor="middle" class="small">but cannot create missing signal</text>
  <line x1="1050" y1="330" x2="1020" y2="220" class="dash" />

  <text x="700" y="525" text-anchor="middle" class="caption">The key experiment asks whether economically meaningful graph positions improve short-horizon cross-sectional ranking.</text>
</svg>
